name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the verified distribution to PyPI."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra async --extra dev

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check src tests examples scripts

      - name: Type check
        run: uv run mypy

      - name: Type check consumer fixture
        run: uv run python scripts/run_consumer_typing.py

      - name: Check SDK routes against OpenAPI
        run: uv run python scripts/check_openapi_drift.py

      - name: Build package
        run: uv build

      - name: Verify package metadata
        run: uvx twine check dist/*

      - name: Smoke test wheel install
        run: uv run python scripts/smoke_wheel_install.py

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/mailchannels
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
