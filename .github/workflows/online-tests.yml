name: Online API Tests

on:
  workflow_dispatch:
    inputs:
      send_real_email:
        description: "Set to true to run the real email send test."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_destructive:
        description: "Set to true to run isolated CRUD tests that mutate live resources."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  online:
    name: Online API
    runs-on: ubuntu-latest
    environment: online-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra async --extra dev

      - name: Run online tests
        env:
          MAILCHANNELS_API_KEY: ${{ secrets.MAILCHANNELS_API_KEY }}
          MAILCHANNELS_API_URL: ${{ vars.MAILCHANNELS_API_URL }}
          MAILCHANNELS_ONLINE_FROM: ${{ vars.MAILCHANNELS_ONLINE_FROM }}
          MAILCHANNELS_ONLINE_TO: ${{ vars.MAILCHANNELS_ONLINE_TO }}
          MAILCHANNELS_ONLINE_DOMAIN: ${{ vars.MAILCHANNELS_ONLINE_DOMAIN }}
          MAILCHANNELS_ONLINE_WEBHOOK_ENDPOINT: ${{ vars.MAILCHANNELS_ONLINE_WEBHOOK_ENDPOINT }}
          MAILCHANNELS_ONLINE_SEND_REAL: ${{ github.event.inputs.send_real_email == 'true' && '1' || '0' }}
          MAILCHANNELS_ONLINE_DESTRUCTIVE: ${{ github.event.inputs.run_destructive == 'true' && '1' || '0' }}
        run: |
          args=""
          if [ "${MAILCHANNELS_ONLINE_DESTRUCTIVE}" = "1" ]; then
            args="--online-destructive"
          fi
          uv run pytest -m online --online ${args}
