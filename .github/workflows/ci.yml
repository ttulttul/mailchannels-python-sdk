name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra async --extra dev

      - name: Run tests
        run: uv run pytest

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra async --extra dev

      - name: Lint
        run: uv run ruff check src tests examples scripts typing_tests

      - name: Type check
        run: uv run mypy

      - name: Type check consumer fixture
        run: uv run python scripts/run_consumer_typing.py

      - name: Build package
        run: uv build

      - name: Smoke test wheel install
        run: uv run python scripts/smoke_wheel_install.py

  openapi-drift:
    name: OpenAPI drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra async --extra dev

      - name: Check SDK routes against OpenAPI
        run: uv run python scripts/check_openapi_drift.py
